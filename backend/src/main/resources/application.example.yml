spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/clinica_auto
    username: postgres
    password: changeme

resilience4j:
  retry:
    instances:
      whatsapp-send:
        ignore-exceptions:
          - com.synapse.clinicafemina.integration.WhatsappTemplateRequiredException

app:
  environment: teste
  clinic:
    slug: fmna
    name: Clínica Femina CRM
    external-provider: DARWIN
    whatsapp-phone-number-id: phone-number-id-do-deploy

  security:
    jwt:
      secret: troque-por-um-segredo-com-32-ou-mais-caracteres

  crypto:
    master-key: troque-por-32-caracteres-exatos

  initial-users:
    enabled: true
    json: '${INITIAL_USERS_JSON:[]}'
    allow-password-reset: false

  rabbitmq:
    username: guest
    password: guest

  whatsapp:
    enabled: false
    verify-token: token-configurado-na-meta
    app-secret: app-secret-da-meta
    access-token: token-whatsapp-cloud-api
    phone-number-id: phone-number-id-do-deploy

  darwin:
    enabled: true
    api-url: https://api.darwin.example/v1
    api-token: token-read-only-darwin

  medware:
    api-url: https://medware.ultramedical.example/api
    username: usuario-api-medware
    password: senha-ou-hash-configurado-fora-do-git
    # Compatibilidade somente para auth-mode=IDENTIFICACAO_HASH.
    password-is-hash: false
    # IDENTIFICACAO envia somente identificacao/senha.
    auth-mode: IDENTIFICACAO
    token-refresh-margin-seconds: 300
    timeout-seconds: 30
    default-start-days-back: 90
    default-end-days-forward: 90
    webhook-token: token-webhook-apenas-etapa-futura

  external-sync:
    scheduler:
      enabled: false
      cron: ""
      timezone: America/Sao_Paulo
      start-days-back: 90
      end-days-forward: 90
