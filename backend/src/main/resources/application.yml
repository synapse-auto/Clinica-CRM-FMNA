spring:
  application:
    name: clinica_auto
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://2.24.97.199:5432/clinica_auto}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:2EYBFYAZK328PLEE594C53}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
