spring:
  application:
    name: clinicafemina
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:clinicafemina}
    username: ${DB_USER:postgres}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  quartz:
    job-store-type: memory
    properties:
      "[org.quartz.threadPool.threadCount]": 2

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: 86400000
  crypto:
    master-key: ${APP_ENCRYPTION_KEY_V1}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

  whatsapp:
    verify-token: ${META_WHATSAPP_VERIFY_TOKEN}
    app-secret: ${META_WHATSAPP_APP_SECRET}
    access-token: ${META_WHATSAPP_ACCESS_TOKEN}
    phone-number-id: ${META_WHATSAPP_PHONE_NUMBER_ID}
    graph-api-url: https://graph.facebook.com/v20.0

  darwin:
    api-url: ${DARWIN_API_URL:https://sandbox.api.darwin.health/v1}
    api-token: ${DARWIN_API_TOKEN}
    sync-cron: ${DARWIN_SYNC_CRON:0 0/15 * * * ?}
    page-size: ${DARWIN_SYNC_PAGE_SIZE:100}
    enabled: ${DARWIN_SYNC_ENABLED:true}