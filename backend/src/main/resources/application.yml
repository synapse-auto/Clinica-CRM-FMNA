spring:
  application:
    name: clinica_auto
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clinica_auto}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        "[format_sql]": true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 16MB
      max-request-size: 16MB
  quartz:
    job-store-type: memory
    properties:
      "[org.quartz.threadPool.threadCount]": 2

resilience4j:
  retry:
    instances:
      whatsapp-send:
        ignore-exceptions:
          - com.synapse.clinicafemina.integration.WhatsappTemplateRequiredException

app:
  environment: ${APP_ENV:${APP_ENVIRONMENT:producao}}
  clinic:
    slug: ${CLINIC_SLUG:}
    name: ${CLINIC_NAME:Clínica Femina CRM}
    external-provider: ${EXTERNAL_PROVIDER:DARWIN}
    whatsapp-phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:${META_WHATSAPP_PHONE_NUMBER_ID:${APP_CLINIC_WHATSAPP_PHONE_NUMBER_ID:}}}

  security:
    jwt:
      secret: ${JWT_SECRET:}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  crypto:
    master-key: ${CRYPTO_MASTER_KEY:}

  initial-users:
    enabled: ${INITIAL_USERS_ENABLED:false}
    json: '${INITIAL_USERS_JSON:[]}'
    allow-password-reset: ${INITIAL_USERS_ALLOW_PASSWORD_RESET:false}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}

  whatsapp:
    enabled: ${WHATSAPP_ENABLED:${APP_WHATSAPP_ENABLED:false}}
    verify-token: ${WHATSAPP_VERIFY_TOKEN:${META_WHATSAPP_VERIFY_TOKEN:}}
    app-secret: ${WHATSAPP_APP_SECRET:${META_WHATSAPP_APP_SECRET:}}
    access-token: ${WHATSAPP_ACCESS_TOKEN:${META_WHATSAPP_ACCESS_TOKEN:}}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:${META_WHATSAPP_PHONE_NUMBER_ID:${APP_CLINIC_WHATSAPP_PHONE_NUMBER_ID:}}}
    business-account-id: ${WHATSAPP_BUSINESS_ACCOUNT_ID:}
    graph-api-url: ${WHATSAPP_GRAPH_API_URL:https://graph.facebook.com/v20.0}

  darwin:
    api-url: ${DARWIN_API_URL:}
    api-token: ${DARWIN_API_TOKEN:}
    sync-cron: ${DARWIN_SYNC_CRON:0 0/15 * * * ?}
    page-size: ${DARWIN_PAGE_SIZE:100}
    enabled: ${DARWIN_ENABLED:false}

  medware:
    api-url: ${MEDWARE_API_URL:}
    username: ${MEDWARE_USERNAME:}
    password: ${MEDWARE_PASSWORD:}
    # Compatibilidade somente para MEDWARE_AUTH_MODE=IDENTIFICACAO_HASH.
    password-is-hash: ${MEDWARE_PASSWORD_IS_HASH:false}
    auth-mode: ${MEDWARE_AUTH_MODE:USUARIO}
    token-refresh-margin-seconds: ${MEDWARE_TOKEN_REFRESH_MARGIN_SECONDS:300}
    timeout-seconds: ${MEDWARE_TIMEOUT_SECONDS:30}
    default-start-days-back: ${MEDWARE_DEFAULT_START_DAYS_BACK:90}
    default-end-days-forward: ${MEDWARE_DEFAULT_END_DAYS_FORWARD:90}
    webhook-token: ${MEDWARE_WEBHOOK_TOKEN:}

  integrations:
    page-size: ${INTEGRATION_PAGE_SIZE:100}
