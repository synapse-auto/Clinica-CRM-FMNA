version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: clinicafemina-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-clinicafemina}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres_pass_padrao_local}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: clinicafemina-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "5672:5672"   # Porta do AMQP
      - "15672:15672" # Porta do painel Management Web
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: clinicafemina-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@clinicafemina.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_pgadmin_local}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      # Evita rebaixar privilegio quando rodando como root no container
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      # Pre-cadastra a conexao com a DB remota (clinica_auto)
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro

  adminer:
    image: adminer:4
    container_name: clinicafemina-adminer
    restart: always
    environment:
      # Pre-preenche host/banco da DB remota na tela de login
      ADMINER_DEFAULT_SERVER: ${ADMINER_DEFAULT_SERVER:-2.24.97.199}
      ADMINER_DESIGN: pepa-linha
    ports:
      - "8081:8080"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinicafemina-backend
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - RABBITMQ_HOST=rabbitmq

volumes:
  postgres_data:
  rabbitmq_data:
  pgadmin_data:
